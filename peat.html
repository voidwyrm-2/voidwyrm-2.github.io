<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="/css/peat.css" rel="stylesheet">
    <title>
        Peat Propaganda
    </title>
    <script>

        function setCookie(name, value, days) {
            var expires = "";
            if (days) {
                var date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/; domain=" + location.hostname;
        }

        function getCookie(name) {
            var nameEQ = name + "=";
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        function eraseCookie(name) {
            document.cookie = name + '=; Max-Age=-1;';
        }



        function peatinit() {
            setCookie('peatscookie', 'meowmode=0', 10000000)
        }


        if (document.readyState === "loading") {
            // Loading hasn't finished yet
            document.addEventListener("DOMContentLoaded", peatinit);
        } else {
            // `DOMContentLoaded` has already fired
            peatinit();
        }
    </script>
</head>

<body>

    <div class="peat peat-default peat-static-top" role="navigation">
        <div class="container">
            <div class="peat-header">
                <button type="button" class="peat-toggle" data-toggle="collapse" data-target=".peat-collapse"></button>
            </div>
        </div>
    </div>

    <div class="main">
        <p id="peatsays1">meow</p>
    </div>

    <div id="footer"></div>
</body>


</html>
