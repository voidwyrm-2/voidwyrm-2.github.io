<!DOCTYPE html>
<html>
<head>
<script>
function CheckPassword() {
    var password = document.getElementById("passwordinput");
    if (password == "1472") document.getElementById("output").innerHTML = "Password correct!";
    else document.getElementById("output").innerHTML = "Password incorrect!";
}
</script>
</head>
<body>
<h2>A test of a password to access information</h2>

<p id="main">A Paragraph</p>
<textarea id="passwordinput">

</textarea>
<button type="button" onclick="CheckPassword()">Check password</button>

<p id="output"></p>
</body>
</html>
